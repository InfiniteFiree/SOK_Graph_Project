<div class="workspace-bar">
    {% for ws in workspaces %}
        <div class="workspace-tab-wrap {% if ws.id == active_workspace_id %}workspace-tab-wrap-active{% endif %}">
            <a href="{{ url_for('index', workspace_id=ws.id) }}"
               class="workspace-tab">
                {{ ws.name }}
            </a>
            <a href="{{ url_for('delete_workspace', workspace_id=ws.id) }}"
               class="workspace-delete"
               title="Delete workspace"
               onclick="event.stopPropagation();">
                ×
            </a>
        </div>
    {% endfor %}
</div>

{% if workspace_error %}
    <div style="margin-bottom:12px; padding:10px 12px; border:1px solid #d9534f; border-radius:8px; background:#fdf2f2; color:#a94442;">
        {{ workspace_error }}
    </div>
{% endif %}

<div class="workspace-create-panel">
    <form action="{{ url_for('create_workspace') }}" method="get" class="workspace-create-form">
        <label>
            Data Source
            <select name="data_source">
                {% for key, plugin in data_plugins.items() %}
                    <option value="{{ key }}"
                        {% if key == selected_data_source %}selected{% endif %}>
                        {{ plugin.name() }}
                    </option>
                {% endfor %}
            </select>
        </label>

        <label>
            Visualizer
            <select name="type">
                {% for key, plugin in plugins.items() %}
                    <option value="{{ key }}"
                        {% if key == selected_visualizer %}selected{% endif %}>
                        {{ plugin.name() }}
                    </option>
                {% endfor %}
            </select>
        </label>

        <label style="min-width: 360px;">
            Source Path
            <select name="source_path">
                {% for target in load_targets %}
                    <option value="{{ target.value }}"
                        {% if target.value == selected_source_path %}selected{% endif %}>
                        {{ target.label }}
                    </option>
                {% endfor %}
            </select>
        </label>

        <button type="submit">+ Create Workspace</button>
    </form>
</div>
