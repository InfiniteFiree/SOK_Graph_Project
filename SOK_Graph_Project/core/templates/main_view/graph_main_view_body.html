<div class="toolbar">
    <input type="text" id="search-input" placeholder="Search graph...">

    <button onclick="applySearch()">Search</button>

    <input type="text" id="attribute-input" class="query-input" placeholder="Attribute" data-operator="=">
    <select class="query-operator" id="operator-select">
        <option value="=">=</option>
        <option value="<"><</option>
        <option value="<="><=</option>
        <option value=">">></option>
        <option value=">=">>=</option>
    </select>
    <input type="text" id="value-input" class="query-input" placeholder="Value">

    <button onclick="applyFilter()">Filter</button>

    <button onclick="clearFilters()">Clear</button>
</div>

<div class="plugins_buttons">
    <button onclick="togglePluginPanel()">Plugins</button>
    <button onclick="toggleDataSourcePanel()">Data Sources</button>
</div>

<div id="plugin-panel" style="display:none">
    <h3>Plugins</h3>
    {% for id, plugin in plugins.items() %}
        <label>
            <input type="radio" name="plugin" value="{{ id }}"
                {% if id == selected_visualizer %}checked{% endif %}
                onchange="updateSelection()">
            {{ plugin.name() }}
        </label><br>
    {% endfor %}
</div>

<div id="data-source-panel" style="display:none">
    <h3>Data Sources</h3>
    {% for id, plugin in data_plugins.items() %}
        <label>
            <input type="radio" name="data_source" value="{{ id }}"
                {% if id == selected_data_source %}checked{% endif %}
                onchange="updateSelection()">
            {{ plugin.name() }}
        </label><br>
    {% endfor %}
</div>

<script>
function togglePluginPanel() {
    const panel = document.getElementById("plugin-panel");
    panel.style.display = panel.style.display === "none" ? "block" : "none";
}

function toggleDataSourcePanel() {
    const panel = document.getElementById("data-source-panel");
    panel.style.display = panel.style.display === "none" ? "block" : "none";
}

function updateSelection() {
    const selectedVisualizer = document.querySelector('#plugin-panel input[type=radio]:checked')?.value || "simple";
    const selectedDataSource = document.querySelector('#data-source-panel input[type=radio]:checked')?.value || "csv";
    window.location = "/?type=" + selectedVisualizer + "&data_source=" + selectedDataSource;
}

function getSelectedVisualizer() {
    return document.querySelector('#plugin-panel input[type=radio]:checked')?.value || "simple_visualizer";
}

function getSelectedDataSource() {
    return document.querySelector('#data-source-panel input[type=radio]:checked')?.value || "csv";
}

async function updateGraph(endpoint, payload) {
    const response = await fetch(endpoint, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
    });

    if (!response.ok) {
        console.error("Request failed", endpoint);
        return;
    }

    const result = await response.json();
    if (result.graph_html !== undefined) {
        const container = document.getElementById("graph-container");
        container.innerHTML = result.graph_html;

        // Scripts inside innerHTML are not executed by the browser.
        // Re-create and re-run them sequentially, waiting for external
        // src scripts (e.g. D3) to finish loading before inline scripts run.
        const scripts = Array.from(container.querySelectorAll("script"));

        function execNext(i) {
            if (i >= scripts.length) return;
            const orig = scripts[i];
            const s = document.createElement("script");
            if (orig.src) {
                s.src = orig.src;
                s.onload = () => execNext(i + 1);
                s.onerror = () => execNext(i + 1);
                document.body.appendChild(s);
            } else {
                s.textContent = orig.textContent;
                document.body.appendChild(s);
                execNext(i + 1);
            }
            orig.remove();
        }

        execNext(0);
    }
}

function applyFilter() {
    const attribute = document.getElementById("attribute-input").value;
    const operator = document.getElementById("operator-select").value;
    const value = document.getElementById("value-input").value;

    updateGraph("/apply_filter", {
        attribute: attribute,
        operator: operator,
        value: value,
        type: getSelectedVisualizer()
    });
}

function clearFilters() {
    updateGraph("/clear_filters", {
        mode: "{{ selected_mode }}",
        dataset: "{{ selected_dataset }}",
        data_source: getSelectedDataSource(),
        type: getSelectedVisualizer()
    });
}

function applySearch() {
    const query = document.getElementById("search-input").value;

    updateGraph("/search", {
        query: query,
        type: getSelectedVisualizer()
    });
}

</script>

<div id="graph-container">{{ graph_html | safe }}</div>
