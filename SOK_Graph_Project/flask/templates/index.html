{% extends "base.html" %}

{% block tree %}
<ul>
    <li>+ Node 1</li>
    <li>+ Node 2</li>
</ul>
{% endblock %}

{% block content %}
<div class="toolbar">
    <!-- File search -->
    <input type="text" id="file-search" placeholder="Search nodes/files..." oninput="applySearch()">

    <!-- Query fields -->
    <input type="text" class="query-input" placeholder="Node ID" data-operator="=">
    <select class="query-operator">
        <option value="=">=</option>
        <option value="<"><</option>
        <option value="<="><=</option>
        <option value=">">></option>
        <option value=">=">>=</option>
    </select>
    <input type="text" class="query-input" placeholder="Value">

    <button onclick="applyQueries()">Apply</button>
</div>

<div id="graph-container">
    {{ graph_html|safe }}
</div>

<!-- D3 CDN -->
<script src="https://d3js.org/d3.v7.min.js"></script>

<script>
    const width = 800;
    const height = 600;

    const svg = d3.select("#graph-container")
        .append("svg")
        .attr("width", "100%")
        .attr("height", height);

    const simulation = d3.forceSimulation()
        .force("link", d3.forceLink().id(d => d.id).distance(150))
        .force("charge", d3.forceManyBody().strength(-500))
        .force("center", d3.forceCenter(width / 2, height / 2));
</script>
{% endblock %}

{% block bird %}
<div class="bird-canvas">
    <p>Mini map preview...</p>
</div>
{% endblock %}
