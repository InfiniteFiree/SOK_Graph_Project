{% extends "base.html" %}

{% block tree %}
<ul>
    <li>+ Node 1</li>
    <li>+ Node 2</li>
</ul>
{% endblock %}

{% block content %}
<script src="https://d3js.org/d3.v7.min.js"></script>
<div class="toolbar">
    <!-- File search -->
    <input type="text" id="file-search" placeholder="Search nodes/files..." oninput="applySearch()">

    <!-- Query fields -->
    <input type="text" class="query-input" placeholder="Node ID" data-operator="=">
    <select class="query-operator">
        <option value="=">=</option>
        <option value="<"><</option>
        <option value="<="><=</option>
        <option value=">">></option>
        <option value=">=">>=</option>
    </select>
    <input type="text" class="query-input" placeholder="Value">

    <button onclick="applyQueries()">Apply</button>
</div>

<div id="graph-container">
    {{ graph_html|safe }}
</div>

{% endblock %}

{% block bird %}
<div id="bird-canvas">
    {{ bird_view|safe }}
</div>
{% endblock %}
