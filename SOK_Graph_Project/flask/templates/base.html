<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>{{ title if title else "Graph Explorer" }}</title>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="header">
        <h2>Graph Visualization Platform</h2>
    </header>

    <!-- TOP TOOLBAR -->
    <div class="top-toolbar">
        {% block toolbar %}{% endblock %}
    </div>

    <!-- MAIN CONTENT -->
    <div class="content">

        <!-- TREE VIEW -->
        <div class="tree-view">
            <h3>Tree View</h3>
            {% block tree %}{% endblock %}
        </div>

        <!-- MAIN VIEW -->
        <div class="main-view">
            <h3>Main View</h3>
            {% block content %}{% endblock %}
        </div>

        <!-- BIRD VIEW -->
        <div class="bird-view">
            <h3>Bird View</h3>
            {% block bird %}{% endblock %}
        </div>

    </div>

    <!-- CLI -->
    <div class="cli">
        <h3>CLI</h3>
        <textarea placeholder="Enter command..."></textarea>
    </div>

</div>

</body>
</html>
